<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="theme-color" content="#f8d7e8">
<title>Olívia 💗</title>
<link rel="manifest" href="manifest.json">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;
background:linear-gradient(145deg,#fff4f8,#fff0d7);
min-height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.screen{
position:fixed;
inset:0;
display:flex;
justify-content:center;
align-items:center;
padding:22px;
transition:1s;
}

.hidden{
opacity:0;
pointer-events:none;
transform:scale(1.05)
}

.card{
width:min(92vw,760px);
background:rgba(255,255,255,.9);
backdrop-filter:blur(20px);
padding:32px;
border-radius:34px;
box-shadow:0 20px 70px rgba(0,0,0,.15);
text-align:center;
}

h1{
font-size:clamp(2rem,8vw,4rem);
color:#bf3f79;
margin-bottom:25px;
}

#mainCounter{
font-size:clamp(4rem,18vw,8rem);
font-weight:900;
color:#35264a;
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:12px;
margin-top:28px;
}

.box{
background:white;
padding:14px;
border-radius:22px;
}

.num{
font-size:clamp(1.5rem,5vw,3rem);
font-weight:800;
color:#bf3f79;
}

.small{
font-size:.8rem;
opacity:.7;
}

button{
margin-top:22px;
border:none;
background:#bf3f79;
color:white;
padding:15px 26px;
border-radius:999px;
font-weight:700;
font-size:1rem;
box-shadow:0 8px 25px rgba(191,63,121,.35);
}

.last10{
animation:pulseBG .6s infinite alternate;
}
.last10 #mainCounter{
animation:boom .5s infinite;
color:#ff2e5f;
}

@keyframes boom{
from{transform:scale(1)}
to{transform:scale(1.18)}
}

@keyframes pulseBG{
from{background:linear-gradient(145deg,#ffe7f3,#fff0d7)}
to{background:linear-gradient(145deg,#ffd5eb,#ffecc0)}
}

#message{
font-size:clamp(1.6rem,6vw,3rem);
line-height:1.5;
font-weight:700;
color:#6f2b55;
}

#reveal img{
width:min(90vw,500px);
border-radius:30px;
box-shadow:0 20px 55px rgba(0,0,0,.2);
margin-bottom:25px;
}

#finalText{
font-size:clamp(2rem,6vw,3.4rem);
font-weight:900;
line-height:1.3;
background:linear-gradient(90deg,#bf3f79,#ff7da5);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.heart{
position:fixed;
font-size:28px;
pointer-events:none;
animation:fly linear forwards;
}

@keyframes fly{
from{transform:translateY(110vh) scale(.7)}
to{transform:translateY(-20vh) scale(1.5);opacity:0}
}
</style>
</head>
<body>

<script>
const IMAGE_URL="https://imgur.com/a/6ZVxGcm";
const SONG_URL="https://drive.google.com/file/d/1FlsOo3ofFzTTh9eJqkdIeypQ5RqwQg56/view?usp=sharing";
</script>

<audio id="music" loop>
<source id="songSrc" src="">
</audio>

<section id="countScreen" class="screen">
<div class="card">
<h1>Vols saber si sóc nen o nena?</h1>
<div id="mainCounter">--</div>

<div class="grid">
<div class="box"><div class="num" id="d">0</div><div class="small">dies</div></div>
<div class="box"><div class="num" id="h">0</div><div class="small">hores</div></div>
<div class="box"><div class="num" id="m">0</div><div class="small">minuts</div></div>
<div class="box"><div class="num" id="s">0</div><div class="small">segons</div></div>
</div>

<button onclick="startMusic()">🎵 Activar música</button>
</div>
</section>

<section id="msgScreen" class="screen hidden">
<div class="card">
<div id="message"></div>
</div>
</section>

<section id="reveal" class="screen hidden">
<div class="card">
<img id="babyPic" src="">
<div id="finalText">
Em dic Olívia avis,<br>
espero que m'estimeu molt,<br>
perquè jo ja us estimo 💗
</div>
</div>
</section>

<script>
document.getElementById('babyPic').src=IMAGE_URL;
document.getElementById('songSrc').src=SONG_URL;

const TARGET=new Date('2026-04-27T21:30:00');
let done=false;

function pad(n){return String(n).padStart(2,'0')}

function tick(){
if(done) return;
let diff=TARGET-new Date();

if(diff<=0){
startMessage();
return;
}

let days=Math.floor(diff/86400000);
let hrs=Math.floor(diff%86400000/3600000);
let mins=Math.floor(diff%3600000/60000);
let sec=Math.floor(diff%60000/1000);

d.textContent=days;
h.textContent=pad(hrs);
m.textContent=pad(mins);
s.textContent=pad(sec);
mainCounter.textContent=`${pad(hrs)}:${pad(mins)}:${pad(sec)}`;

if(diff<=10000){
document.body.classList.add('last10');
mainCounter.textContent=sec;
hearts();
}
}

setInterval(tick,1000);
tick();

function startMusic(){
document.getElementById('music').load();
document.getElementById('music').play();
}

function startMessage(){
done=true;
countScreen.classList.add('hidden');
setTimeout(()=>{
msgScreen.classList.remove('hidden');
typeText();
},1000)
}

const txt="Hola avis, sóc el vostre nèt o neta, els papas m'han dit que quan ells eren petits, els vau cuidar molt bé, així que jo espero que també em cuideu igual que ho heu fet amb ells";

function typeText(){
let i=0;
let box=document.getElementById('message');
let t=setInterval(()=>{
box.textContent=txt.slice(0,i++);
if(i>txt.length) clearInterval(t)
},55)

setTimeout(showReveal,60000)
}

function showReveal(){
msgScreen.classList.add('hidden');
setTimeout(()=>{
reveal.classList.remove('hidden');
setInterval(hearts,800)
},1000)
}

function hearts(){
for(let i=0;i<5;i++){
let h=document.createElement('div');
h.className='heart';
h.innerHTML=Math.random()>.5?'💗':'✨';
h.style.left=Math.random()*100+'vw';
h.style.animationDuration=(4+Math.random()*4)+'s';
document.body.appendChild(h);
setTimeout(()=>h.remove(),7000)
}
}

if(new Date()>=TARGET) startMessage();

if('serviceWorker' in navigator){
navigator.serviceWorker.register('sw.js');
}
</script>
</body>
</html>
